services:
  - type: web
    name: expense-rack-backend
    env: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/auth/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: expense_tracker
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 86400000
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SEED_DEMO_DATA
        value: false
      - key: BREVO_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_FROM_NAME
        value: Expense Tracker
